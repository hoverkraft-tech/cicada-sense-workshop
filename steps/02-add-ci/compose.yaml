---
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command:
      - node-dev-entrypoint
      - npm
      - run
      - dev
    stdin_open: true
    tty: true
    init: true
    volumes:
      - ./application/monitoring-workspace/backend:/usr/src/app
      - ./application/tsconfig.base.json:/usr/tsconfig.base.json:ro
      - ./application/biome.json:/usr/src/biome.json:ro
    environment:
      BIOME_CONFIG_PATH: /usr/src/biome.json
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://cicada@postgres:5432/cicada_sense
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "1"
      HOME: /tmp/node-home
      NPM_CONFIG_CACHE: /tmp/node-home/.npm
    ports:
      - 3000:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cicada-sense-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command:
      - node-dev-entrypoint
      - npm
      - run
      - dev
    stdin_open: true
    tty: true
    init: true
    volumes:
      - ./application/monitoring-workspace/frontend:/usr/src/app
      - ./application/tsconfig.base.json:/usr/tsconfig.base.json:ro
      - ./application/biome.json:/usr/src/biome.json:ro
    environment:
      BIOME_CONFIG_PATH: /usr/src/biome.json
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      VITE_DEV_PROXY_TARGET: http://backend:3000
      HOME: /tmp/node-home
      NPM_CONFIG_CACHE: /tmp/node-home/.npm
    ports:
      - 5173:5173
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cicada-sense-network

  live-data-generator-api:
    build:
      context: .
      dockerfile: docker/live-data-generator/Dockerfile
      target: dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command:
      - node-dev-entrypoint
      - npm
      - run
      - dev:backend
    stdin_open: true
    tty: true
    init: true
    volumes:
      - ./application/live-data-generator:/usr/src/app
      - ./application/tsconfig.base.json:/usr/src/tsconfig.base.json:ro
      - ./application/biome.json:/usr/src/biome.json:ro
    environment:
      BIOME_CONFIG_PATH: /usr/src/biome.json
      NODE_ENV: development
      PORT: "3100"
      CICADA_BACKEND_URL: http://backend:3000
      CHOKIDAR_USEPOLLING: "1"
      HOME: /tmp/node-home
      NPM_CONFIG_CACHE: /tmp/node-home/.npm
    ports:
      - 3100:3100
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cicada-sense-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3100/api/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  live-data-generator:
    build:
      context: .
      dockerfile: docker/live-data-generator/Dockerfile
      target: dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command:
      - node-dev-entrypoint
      - npm
      - run
      - dev:frontend
    stdin_open: true
    tty: true
    init: true
    volumes:
      - ./application/live-data-generator:/usr/src/app
      - ./application/tsconfig.base.json:/usr/src/tsconfig.base.json:ro
      - ./application/biome.json:/usr/src/biome.json:ro
    environment:
      BIOME_CONFIG_PATH: /usr/src/biome.json
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "1"
      VITE_GENERATOR_PROXY_TARGET: http://live-data-generator-api:3100
      HOME: /tmp/node-home
      NPM_CONFIG_CACHE: /tmp/node-home/.npm
    ports:
      - 5174:5174
    depends_on:
      live-data-generator-api:
        condition: service_healthy
    networks:
      - cicada-sense-network

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cicada_sense
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: cicada
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - cicada-sense-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cicada -d cicada_sense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    networks:
      - cicada-sense-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  object-storage:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    expose:
      - "9000"
      - "9001"
    volumes:
      - object-storage-data:/data
    networks:
      - cicada-sense-network

networks:
  cicada-sense-network:
    driver: bridge

volumes:
  object-storage-data:
  postgres-data:
