# specifics manifests (both argocd apps and raw manifests) that will be applied cluster by cluster
# each targeted cluster should have a corresponding folder at the root of the repo
# check `./tools` or `./dev` directories for example
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: envs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  generators:
    - list:
        elements:
          - cluster: tools
            url: https://kubernetes.default.svc
            env: tools
          - cluster: dev
            # url: https://dev.k8s.example.com
            env: dev
          - cluster: prod
            # url: https://prod.k8s.example.com
            env: prod
  template:
    metadata:
      name: "{{env}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      labels:
        layer: infrastructure
        service: envs
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        namespace: argocd
        server: https://kubernetes.default.svc
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        automated:
          prune: true
          allowEmpty: true
          selfHeal: true
      sources:
        # NOTE: please change the organization and repository name here
        - repoURL: git@github.com:hoverkraft-sh/argocd-app-of-apps.git
          path: "{{env}}"
          targetRevision: HEAD
          directory:
            recurse: false
